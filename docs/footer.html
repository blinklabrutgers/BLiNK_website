<script>
(function(){
  var exts=['.jpg','.jpeg','.JPG','.JPEG','.png','.PNG','.webp','.heic'];
  function fix(img){
    var src=img.getAttribute('src')||'';
    var dot=src.lastIndexOf('.'); if(dot<0){img.src='images/placeholder.svg';return;}
    var base=src.substring(0,dot);
    var tried=(img.getAttribute('data-tried')||'').split(',').filter(Boolean);
    tried.push(src.substring(dot));
    for(var j=0;j<exts.length;j++){
      if(tried.indexOf(exts[j])===-1){
        img.setAttribute('data-tried',tried.join(','));
        img.src=base+exts[j];
        return;
      }
    }
    img.src='images/placeholder.svg';
  }
  document.querySelectorAll('img.person-photo').forEach(function(img){
    img.addEventListener('error',function(){fix(img);});
    if(img.complete && img.naturalWidth===0) fix(img);
  });
})();
</script>
